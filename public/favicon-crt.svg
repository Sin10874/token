<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="2" fill="#050505"/>
  <!-- Phosphor T-account — slightly thicker for CRT bleed -->
  <line x1="6" y1="8" x2="26" y2="8" stroke="#c8a030" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="16" y1="8" x2="16" y2="26" stroke="#c8a030" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Debit entries — phosphor amber, square caps -->
  <line x1="9" y1="13.5" x2="14.5" y2="13.5" stroke="#c8a030" stroke-width="1.8" stroke-linecap="square" opacity="0.8"/>
  <line x1="9" y1="18.5" x2="13.5" y2="18.5" stroke="#c8a030" stroke-width="1.8" stroke-linecap="square" opacity="0.5"/>
  <line x1="9" y1="23.5" x2="12" y2="23.5" stroke="#c8a030" stroke-width="1.8" stroke-linecap="square" opacity="0.35"/>
  <!-- Faint scanline hints -->
  <line x1="0" y1="11" x2="32" y2="11" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="21" x2="32" y2="21" stroke="#000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="26" x2="32" y2="26" stroke="#000" stroke-width="0.5" opacity="0.15"/>
</svg>
