<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Paper background -->
  <rect width="32" height="32" fill="#f0ece0"/>
  <!-- Dashed border — perforation -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#b8b2a0" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Ink T-account — slightly uneven weight for typewriter feel -->
  <line x1="6" y1="8" x2="26" y2="8" stroke="#1a1a18" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="16" y2="26" stroke="#1a1a18" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Debit entries — dark ink, red for the cost one -->
  <line x1="9" y1="13.5" x2="14.5" y2="13.5" stroke="#1a1a18" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="9" y1="18.5" x2="13.5" y2="18.5" stroke="#8b2500" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="9" y1="23.5" x2="12" y2="23.5" stroke="#1a1a18" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
